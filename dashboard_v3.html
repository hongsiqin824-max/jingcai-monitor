<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞彩支持率 · SCOUT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F0F4F8;
      --surface: #FFFFFF;
      --raised:  #F5F8FB;
      --border:  #DDE3EC;
      --fire:    #ff4e42;
      --straw:   #B87D0A;
      --ice:     #3B82F6;
      --chalk:   #1C2B3A;
      --ash:     #6B7A8D;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Noto Sans SC', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--chalk);
      font-family: var(--font-body);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── header ── */
    .header {
      padding: 16px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand-cjk {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 18px;
      color: var(--chalk);
      letter-spacing: 0.04em;
    }

    .brand-en {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--fire);
      letter-spacing: 0.12em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--fire);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--fire);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    .refresh-info {
      font-size: 11px;
      color: var(--ash);
      font-variant-numeric: tabular-nums;
    }

    /* ── date tabs ── */
    .date-bar {
      padding: 0 28px;
      display: flex;
      align-items: flex-end;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-top: 10px;
      overflow-x: auto;
    }

    .date-bar-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ash);
      margin-right: 12px;
      padding-bottom: 10px;
      white-space: nowrap;
    }

    .date-btn {
      padding: 9px 14px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--ash);
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      letter-spacing: 0.02em;
      margin-bottom: -1px;
    }

    .date-btn:hover        { color: var(--chalk); }
    .date-btn.active       { color: var(--chalk); border-bottom-color: var(--fire); }

    /* ── main ── */
    .main { padding: 20px 28px 40px; }

    .stats {
      font-size: 11px;
      color: var(--ash);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .stats b { color: var(--chalk); font-variant-numeric: tabular-nums; }

    /* ── grid ── */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    /* ── card ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .chart-card:hover { border-color: var(--fire); }

    .card-meta {
      padding: 7px 14px 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--ash);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .card-matchup {
      font-size: 12px;
      font-weight: 700;
      color: var(--chalk);
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .card-matchup .vs {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--ash);
      margin: 0 3px;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .plotly-container { width: 100%; height: 295px; }

    /* ── no data ── */
    .no-data {
      grid-column: span 2;
      text-align: center;
      color: var(--ash);
      padding: 80px 0;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
    }

    .page-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ash);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .page-btn:hover:not(:disabled) { color: var(--chalk); border-color: var(--chalk); }
    .page-btn.active               { background: var(--fire); color: #fff; border-color: var(--fire); }
    .page-btn:disabled             { opacity: 0.2; cursor: not-allowed; }

    /* ── modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      justify-content: center; align-items: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.show { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      width: 92vw; max-width: 1100px;
      padding: 20px;
      position: relative;
    }

    .modal-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-right: 32px;
    }

    .modal-title {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      color: var(--chalk);
      letter-spacing: 0.03em;
    }

    .modal-meta {
      font-size: 11px;
      color: var(--ash);
      letter-spacing: 0.08em;
      margin-left: 12px;
    }

    .modal-close {
      position: absolute; top: 18px; right: 20px;
      font-size: 18px; cursor: pointer;
      color: var(--ash); line-height: 1;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--chalk); }

    #modal-chart { width: 100%; height: 500px; }

    /* ── refresh bar ── */
    .refresh-bar {
      height: 2px;
      background: var(--fire);
      position: fixed; bottom: 0; left: 0;
      transition: width linear;
      z-index: 999;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <span class="brand-cjk">竞彩足球</span>
    <span class="brand-en">SCOUT</span>
  </div>
  <div class="header-right">
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    <span class="refresh-info" id="refresh-info">每5分钟自动更新</span>
  </div>
</div>

<div class="date-bar">
  <span class="date-bar-label">日期</span>
  <div id="date-btns" style="display:flex;"></div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="chart-grid" id="chart-grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <span class="modal-meta" id="modal-meta"></span>
    </div>
    <span class="modal-close" id="modal-close">&#x2715;</span>
    <div id="modal-chart"></div>
  </div>
</div>

<div class="refresh-bar" id="refresh-bar" style="width:0%"></div>

<script>
const PAGE_SIZE = 4;
const REFRESH_INTERVAL = 300;

let currentDate = "";
let currentDates = [];
let allMatches = [];
let currentPage = 1;
let chartDataCache = {};
let chartRangeCache = {};
let refreshCountdown = REFRESH_INTERVAL;

// ── layout helpers ──

function calcYRange(data) {
  const allVals = [...data.win, ...data.draw, ...data.loss];
  const dataMin = Math.min(...allVals);
  const dataMax = Math.max(...allVals);
  const low  = Math.max(0,   Math.floor((dataMin - 5) / 5) * 5);
  const high = Math.min(100, Math.ceil( (dataMax + 5) / 5) * 5);
  return [low, high];
}

function mergeYRange(mid, newRange) {
  const cur = chartRangeCache[mid];
  if (!cur) { chartRangeCache[mid] = newRange; return newRange; }
  const merged = [Math.min(cur[0], newRange[0]), Math.max(cur[1], newRange[1])];
  chartRangeCache[mid] = merged;
  return merged;
}

function getCardLayout(yRange) {
  return {
    margin: { t: 8, r: 8, b: 52, l: 36 },
    xaxis: {
      tickangle: -30,
      tickfont: { size: 9, color: '#6B7A8D' },
      gridcolor: '#E8EDF3', linecolor: '#DDE3EC', zerolinecolor: '#E8EDF3',
    },
    yaxis: {
      range: yRange || [0, 100], ticksuffix: "%",
      tickfont: { size: 9, color: '#6B7A8D' },
      gridcolor: '#E8EDF3', linecolor: '#DDE3EC', zerolinecolor: '#E8EDF3',
    },
    legend: {
      orientation: "h", y: 1.18, x: 0.99, xanchor: "right",
      font: { size: 10, color: '#6B7A8D' }, bgcolor: 'rgba(0,0,0,0)',
    },
    hovermode: "x unified",
    plot_bgcolor: 'transparent', paper_bgcolor: 'transparent',
    hoverlabel: { bgcolor: '#FFFFFF', bordercolor: '#DDE3EC', font: { color: '#1C2B3A', size: 12 } },
  };
}

function getModalLayout(yRange) {
  return {
    margin: { t: 16, r: 20, b: 55, l: 48 },
    xaxis: {
      title: { text: '采集时间', font: { color: '#6B7A8D', size: 12 } },
      tickangle: -30, tickfont: { color: '#6B7A8D' },
      gridcolor: '#E8EDF3', linecolor: '#DDE3EC', zerolinecolor: '#E8EDF3',
    },
    yaxis: {
      title: { text: '支持率 (%)', font: { color: '#6B7A8D', size: 12 } },
      range: yRange || [0, 100], ticksuffix: "%", tickfont: { color: '#6B7A8D' },
      gridcolor: '#E8EDF3', linecolor: '#DDE3EC', zerolinecolor: '#E8EDF3',
    },
    legend: {
      orientation: "h", y: 1.06, x: 0.5, xanchor: "center",
      font: { color: '#6B7A8D', size: 12 }, bgcolor: 'rgba(0,0,0,0)',
    },
    hovermode: "x unified",
    plot_bgcolor: 'transparent', paper_bgcolor: 'transparent',
    hoverlabel: { bgcolor: '#FFFFFF', bordercolor: '#DDE3EC', font: { color: '#1C2B3A', size: 13 } },
  };
}

function buildTraces(data) {
  const traces = [
    { x: data.times, y: data.win,  mode: "lines+markers", name: "胜", yaxis: 'y',
      line: { color: "#ff4e42", width: 2.5 }, marker: { size: 4 } },
    { x: data.times, y: data.draw, mode: "lines+markers", name: "平", yaxis: 'y',
      line: { color: "#B87D0A", width: 2.5 }, marker: { size: 4 } },
    { x: data.times, y: data.loss, mode: "lines+markers", name: "负", yaxis: 'y',
      line: { color: "#3B82F6", width: 2.5 }, marker: { size: 4 } },
  ];
  return traces;
}

// ── init & date selection ──

async function init() {
  const res = await fetch("/api/dates");
  const data = await res.json();
  renderDateBtns(data.dates, data.today);
  const defaultDate = data.dates.includes(data.today) ? data.today : data.dates[data.dates.length - 1];
  selectDate(defaultDate);
  startRefreshTimer();
}

function renderDateBtns(dates, today) {
  const container = document.getElementById("date-btns");
  container.innerHTML = "";
  currentDates = dates;
  dates.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "date-btn";
    btn.textContent = d === today ? d + " 今日" : d;
    btn.dataset.date = d;
    btn.onclick = () => selectDate(d);
    container.appendChild(btn);
  });
}

async function selectDate(date) {
  currentDate = date;
  currentPage = 1;
  chartDataCache = {};
  chartRangeCache = {};
  document.querySelectorAll(".date-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.date === date));
  const res = await fetch(`/api/matches?date=${date}`);
  const data = await res.json();
  allMatches = data.matches;
  updateStats();
  renderPage(currentPage);
}

function updateStats() {
  const total = allMatches.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  document.getElementById("stats").innerHTML = total > 0
    ? `<b>${total}</b> 场比赛 &nbsp;·&nbsp; 第 <b>${currentPage}</b> / <b>${totalPages}</b> 页`
    : "";
}

// ── page render ──

async function renderPage(page) {
  currentPage = page;
  const grid = document.getElementById("chart-grid");
  grid.innerHTML = "";
  const start = (page - 1) * PAGE_SIZE;
  const pageMatches = allMatches.slice(start, start + PAGE_SIZE);
  updateStats();
  renderPagination();

  if (pageMatches.length === 0) {
    grid.innerHTML = '<div class="no-data">该日期暂无比赛数据</div>';
    return;
  }

  pageMatches.forEach(m => {
    const card = document.createElement("div");
    card.className = "chart-card";
    card.id = `card-${m.mid}`;
    card.innerHTML = `
      <div class="card-meta">
        <span>${m["比赛编号"]} &middot; ${m["联赛"]} &middot; ${m["比赛日期"]}</span>
        <span class="card-matchup">${m["主队"]} <span class="vs">VS</span> ${m["客队"]}</span>
      </div>
      <div class="plotly-container" id="plot-${m.mid}"></div>
    `;
    card.addEventListener("dblclick", () => openModal(m.mid, m["主队"] + " VS " + m["客队"], m["比赛编号"] + " · " + m["联赛"] + " · " + m["比赛日期"]));
    grid.appendChild(card);
  });

  await Promise.all(pageMatches.map(m => loadAndRenderChart(m.mid, `plot-${m.mid}`, false)));
}

async function loadAndRenderChart(mid, containerId, isModal) {
  let data = chartDataCache[mid];
  if (!data) {
    try {
      const res = await fetch(`/api/chart/${mid}`);
      if (!res.ok) { showNoData(containerId); return; }
      data = await res.json();
      chartDataCache[mid] = data;
    } catch (e) {
      showNoData(containerId);
      return;
    }
  }
  const yRange = mergeYRange(mid, calcYRange(data));
  const layout = isModal ? getModalLayout(yRange) : getCardLayout(yRange);
  Plotly.react(containerId, buildTraces(data), layout, { displayModeBar: isModal, responsive: true });
}

function showNoData(containerId) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = '<div style="text-align:center;color:#6B7A8D;padding:50px 0;font-size:11px;letter-spacing:.12em;text-transform:uppercase;">暂无数据</div>';
}

// ── pagination ──

function renderPagination() {
  const total = allMatches.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const container = document.getElementById("pagination");
  container.innerHTML = "";
  if (totalPages <= 1) return;
  container.appendChild(makePagerBtn("‹", currentPage === 1, () => renderPage(currentPage - 1)));
  for (let i = 1; i <= totalPages; i++) {
    const btn = makePagerBtn(i, false, () => renderPage(i));
    if (i === currentPage) btn.classList.add("active");
    container.appendChild(btn);
  }
  container.appendChild(makePagerBtn("›", currentPage === totalPages, () => renderPage(currentPage + 1)));
}

function makePagerBtn(text, disabled, onClick) {
  const btn = document.createElement("button");
  btn.className = "page-btn";
  btn.textContent = text;
  btn.disabled = disabled;
  if (!disabled) btn.onclick = onClick;
  return btn;
}

// ── modal ──

function openModal(mid, title, meta) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-meta").textContent = meta || "";
  document.getElementById("modal-overlay").classList.add("show");
  chartDataCache[mid] = null;
  loadAndRenderChart(mid, "modal-chart", true);
}

document.getElementById("modal-close").onclick = () => {
  document.getElementById("modal-overlay").classList.remove("show");
  Plotly.purge("modal-chart");
};
document.getElementById("modal-overlay").onclick = e => {
  if (e.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.remove("show");
    Plotly.purge("modal-chart");
  }
};

// ── refresh timer ──

function startRefreshTimer() {
  refreshCountdown = REFRESH_INTERVAL;
  updateRefreshBar();
  setInterval(async () => {
    refreshCountdown--;
    updateRefreshBar();
    if (refreshCountdown <= 0) {
      refreshCountdown = REFRESH_INTERVAL;
      const bar = document.getElementById("refresh-bar");
      bar.style.transition = "none";
      bar.style.width = "0%";
      await silentRefresh();
    }
  }, 1000);
}

async function silentRefresh() {
  document.getElementById("refresh-info").textContent = "正在更新...";
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageMatches = allMatches.slice(start, start + PAGE_SIZE);
  const oldMids = pageMatches.map(m => m.mid).join(",");
  pageMatches.forEach(m => { chartDataCache[m.mid] = null; });

  const datesRes = await fetch("/api/dates");
  const datesData = await datesRes.json();
  if (datesData.dates.join(",") !== currentDates.join(",")) {
    renderDateBtns(datesData.dates, datesData.today);
  }
  document.querySelectorAll(".date-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.date === currentDate));

  const matchRes = await fetch(`/api/matches?date=${currentDate}`);
  const matchData = await matchRes.json();
  allMatches = matchData.matches;

  const newMids = allMatches.slice(start, start + PAGE_SIZE).map(m => m.mid).join(",");
  if (newMids !== oldMids) {
    await renderPage(currentPage);
  } else {
    await Promise.all(pageMatches.map(async m => {
      const res = await fetch(`/api/chart/${m.mid}`);
      if (!res.ok) return;
      const data = await res.json();
      chartDataCache[m.mid] = data;
      const containerId = `plot-${m.mid}`;
      if (document.getElementById(containerId)) {
        const yRange = mergeYRange(m.mid, calcYRange(data));
        Plotly.react(containerId, buildTraces(data), getCardLayout(yRange), { responsive: true });
      }
    }));
  }

  const now = new Date().toLocaleTimeString("zh-CN");
  document.getElementById("refresh-info").textContent = `更新于 ${now}`;
}

function updateRefreshBar() {
  const pct = ((REFRESH_INTERVAL - refreshCountdown) / REFRESH_INTERVAL * 100).toFixed(1);
  const bar = document.getElementById("refresh-bar");
  bar.style.transition = "width 1s linear";
  bar.style.width = pct + "%";
}

init();
</script>
</body>
</html>
